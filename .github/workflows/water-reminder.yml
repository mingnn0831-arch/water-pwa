name: Water Push Trigger

on:
  schedule:
    - cron: '*/5 * * * *' # 5분마다 실행
  workflow_dispatch: # 직접 실행 버튼 활성화

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Push API
        run: |
          curl -X GET "https://${{ secrets.VERCEL_APP_URL }}/api/send-push" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
