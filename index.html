<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="물 알림">
  <meta name="theme-color" content="#F8F9FA">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <style>
    body { background: #F8F9FA; color: #212529; font-family: -apple-system, sans-serif; visibility: hidden; }
    .header { display: flex; justify-content: space-between; padding: 60px 20px 10px; }
    #app { visibility: visible; }
  </style>
  <link rel="stylesheet" href="/style.css">
  <title>물 마시기 알림</title>
  <script>window.VAPID_PUBLIC_KEY = 'BCo_IV9cZP0d8KF9rMngj7HuIaJJufusrgLRsxZDafYCVh-1WkOkfTAungHHFGVHHN7YSufqR-Aug4tx_SxUtiQ';</script>
</head>
<body>
<div id="app">

  <div class="header">
    <span class="header-title">물 마시기</span>
    <span class="status-pill inactive" id="statusPill">꺼짐</span>
  </div>

  <div class="install-hint" id="installHint">
    <strong>홈 화면에 추가하면 백그라운드 알림이 활성화됩니다.</strong><br>
    Safari → 공유 버튼 → 홈 화면에 추가 → 추가
  </div>

  <div class="permission-banner" id="permBanner">
    알림 권한이 필요합니다. 브라우저 설정에서 알림을 허용해 주세요.
  </div>

  <!-- Countdown section removed as requested -->

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="todayCount">0</div>
      <div class="stat-lbl">오늘 음수</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="maxCountEl">0</div>
      <div class="stat-lbl">목표 횟수</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="activeHoursEl">0h</div>
      <div class="stat-lbl">활성 시간</div>
    </div>
  </div>

    <div class="card-label">
      알림 비활성 시간
      <span class="badge-sleep">알림 안 옴</span>
    </div>

    <div class="timeline-wrap">
      <div class="timeline-bar"></div>
      <div class="timeline-labels">
        <span>0시</span>
        <span>6시</span>
        <span>12시</span>
        <span>18시</span>
        <span>24시</span>
      </div>
    </div>

    <div class="time-row">
      <div class="time-col">
        <div class="time-col-lbl">시작 시간</div>
        <select class="time-select" id="wakeSelect"></select>
      </div>
      <div class="time-arrow">→</div>
      <div class="time-col">
        <div class="time-col-lbl">종료 시간</div>
        <select class="time-select" id="sleepSelect"></select>
      </div>
    </div>

    <!-- Summary removed as requested -->
  </div>

  <div class="card">
    <div class="card-label">알림 간격</div>
    <div class="interval-header">
      <div>
        <span class="interval-val" id="intervalVal">1</span>
        <span class="interval-unit" id="intervalUnit">시간마다</span>
      </div>
      <div class="interval-sub" id="intervalSub">하루 0회 예상</div>
    </div>
    <div class="picker-wrapper">
      <div class="picker-container" id="intervalPicker">
        <div class="picker-item" data-val="20">20분</div>
        <div class="picker-item" data-val="30">30분</div>
        <div class="picker-item" data-val="40">40분</div>
        <div class="picker-item" data-val="50">50분</div>
        <div class="picker-item" data-val="60">60분</div>
        <div class="picker-item" data-val="70">70분</div>
        <div class="picker-item" data-val="80">80분</div>
        <div class="picker-item" data-val="90">90분</div>
        <div class="picker-item" data-val="100">100분</div>
        <div class="picker-item" data-val="110">110분</div>
        <div class="picker-item" data-val="120">120분</div>
      </div>
      <div class="picker-selection"></div>
    </div>
    <div class="picker-hint">위아래로 밀어서 선택</div>
  </div>

  <div class="test-section">
    <button class="test-btn" id="testPushBtn">🔔 알림 테스트 (5초 후)</button>
  </div>
  
  <button class="toggle-btn inactive" id="toggleBtn" onclick="toggleAlarm()">알림 시작하기</button>

</div>

<div class="drink-toast" id="drinkToast">물 마셨어요! 💧</div>

<script src="/app.js"></script>
</body>
</html>
